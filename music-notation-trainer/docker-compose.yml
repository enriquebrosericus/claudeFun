services:
  notation-trainer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notation-trainer
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# Access the app at http://localhost:8080
