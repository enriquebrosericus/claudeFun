version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mlb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - mlb_postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5433:5432"      # offset to avoid conflicts with other postgres instances
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlb -d mlb_stats"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MLB Stats Scraper ──────────────────────────────────────────────────────
  scraper:
    build: .
    container_name: mlb_stats_scraper
    restart: unless-stopped
    environment:
      TEAM_ID: "136"           # Seattle Mariners
      TEAM_ABBR: "SEA"
      SEASON: "2025"
      POLL_INTERVAL: "1800"    # 30 min baseline; auto-shortens during/after games
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
    networks:
      - monitoring
    depends_on:
      postgres:
        condition: service_healthy

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: mlb_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_LOGIN_COOKIE_NAME: grafana_session_mlb
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SERVER_ROOT_URL: ${GF_ROOT_URL}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/team_overview.json
    volumes:
      - mlb_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"            # 3001 to avoid conflict with amazon tracker
    networks:
      - monitoring
    depends_on:
      - postgres

networks:
  monitoring:
    driver: bridge

volumes:
  mlb_postgres_data:
  mlb_grafana_data:
