<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MLB Stats{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-md sticky-top">
    <div class="container-fluid px-3">
      <a class="navbar-brand" href="/">⚾ MLB Stats</a>
      <button class="navbar-toggler border-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-3 gap-1">
          <li class="nav-item"><a class="nav-link {% if request.path == '/teams' %}active{% endif %}" href="/teams">Teams</a></li>
          <li class="nav-item"><a class="nav-link {% if request.path == '/players' %}active{% endif %}" href="/players">Players</a></li>
          <li class="nav-item"><a class="nav-link {% if request.path == '/recap' %}active{% endif %}" href="/recap">Game Recap</a></li>
          <li class="nav-item"><a class="nav-link {% if request.path == '/divisions' %}active{% endif %}" href="/divisions">Division Race</a></li>
          <li class="nav-item"><a class="nav-link {% if request.path == '/challenges' %}active{% endif %}" href="/challenges">Challenges</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-3 py-3">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script>
    Chart.defaults.color = '#898c93';
    Chart.defaults.borderColor = '#2e3340';
    Chart.defaults.font.family = "'Silkscreen', monospace";
    Chart.defaults.font.size = 9;

    function mkChart(id, cfg) {
      const el = document.getElementById(id);
      if (!el) return null;
      if (el._ch) el._ch.destroy();
      el._ch = new Chart(el, cfg);
      return el._ch;
    }

    function populateSelect(id, items, selected, labelFn, valFn) {
      const sel = document.getElementById(id);
      if (!sel) return;
      const prev = sel.value || selected;
      sel.innerHTML = '';
      items.forEach(item => {
        const v = valFn ? valFn(item) : item;
        const l = labelFn ? labelFn(item) : item;
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = l;
        if (String(v) === String(prev)) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    async function api(path) {
      const r = await fetch(path);
      if (!r.ok) return null;
      return r.json();
    }

    function fmt(v, decimals=3) {
      if (v == null) return '—';
      const n = parseFloat(v);
      return isNaN(n) ? '—' : n.toFixed(decimals);
    }

    function set(id, val) {
      const el = document.getElementById(id);
      if (el) el.textContent = val ?? '—';
    }

    const COLORS = ['#3cb9c2','#a1c05c','#d458a3','#cc8449','#a461c8','#c03a47','#5a8fcd','#c29e42','#6f7685','#d3d5d3'];
    const TEAM_COLORS = {
      SEA:'#005C5C', HOU:'#EB6E1F', TEX:'#003278', LAA:'#BA0021', OAK:'#003831',
      ATH:'#003831', NYY:'#003087', BOS:'#BD3039', TOR:'#134A8E', BAL:'#DF4601',
      TB:'#092C5C', CLE:'#E31937', DET:'#FA4616', CWS:'#27251F', KC:'#004687',
      MIN:'#002B5C', LAD:'#005A9C', SF:'#FD5A1E', SD:'#2F241D', COL:'#33006F',
      ARI:'#A71930', ATL:'#CE1141', NYM:'#002D72', PHI:'#E81828', MIA:'#00A3E0',
      WSH:'#AB0003', STL:'#C41E3A', CHC:'#0E3386', MIL:'#FFC52F', CIN:'#C6011F',
      PIT:'#FDB827',
    };

    function teamColor(abbr, alpha=1) {
      const hex = TEAM_COLORS[abbr] || '#3b82f6';
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${alpha})`;
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
